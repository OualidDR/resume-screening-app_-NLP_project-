version: '3.8'

services:
  resumeiq:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resumeiq-app
    ports:
      - "8501:8501"
    volumes:
      # Persist uploaded data and artifacts
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  data:
  artifacts: